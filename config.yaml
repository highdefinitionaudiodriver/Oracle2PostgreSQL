# ======================================================================
# Oracle → PostgreSQL Migration Tool - Configuration
# ======================================================================
# このファイルをコピーして環境に合わせてカスタマイズしてください。
# Copy this file and customize for your environment.
# ======================================================================

# --------------------------------------------------
# General Settings / 一般設定
# --------------------------------------------------
general:
  # Input/output file encoding
  input_encoding: "utf-8"
  output_encoding: "utf-8"

  # File extensions to process (comma-separated)
  file_extensions:
    - ".sql"
    - ".pls"
    - ".pkb"
    - ".pks"
    - ".trg"
    - ".vw"
    - ".fnc"
    - ".prc"

  # Output file suffix (appended before extension)
  output_suffix: "_pg"

  # Add migration header comment to output files
  add_header: true

  # Create backup of original files before processing
  create_backup: true

  # Backup directory (relative to input dir; null = _backup/ inside input dir)
  backup_dir: null

# --------------------------------------------------
# Logging / ログ設定
# --------------------------------------------------
logging:
  # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  console_level: "INFO"
  file_level: "DEBUG"

  # Log file path (relative to project root)
  log_file: "logs/migration.log"

  # Max log file size in bytes (5MB default), and backup count
  max_bytes: 5242880
  backup_count: 3

# --------------------------------------------------
# Language / 言語設定
# --------------------------------------------------
language: "ja"

# --------------------------------------------------
# Rule Categories Toggle / ルールカテゴリ ON/OFF
# --------------------------------------------------
# Set to false to skip entire category during transformation.
rules:
  categories:
    DATATYPE: true        # Data type conversion (VARCHAR2→VARCHAR, etc.)
    FUNCTION: true        # Oracle function mapping (NVL→COALESCE, etc.)
    SYNTAX: true          # Syntax conversion (FROM DUAL, hints, etc.)
    PLSQL: true           # PL/SQL → PL/pgSQL conversion
    SEQUENCE: true        # Sequence syntax conversion
    OBJECT: true          # Object-level conversion (bitmap index, etc.)
    TRIGGER: true         # Trigger conversion
    SYNONYM: true         # Synonym → View/search_path conversion

  # Specific rules to disable (by rule ID).
  # These rules will be skipped even if their category is enabled.
  # Example: ["FN_005", "SX_003", "DT_010"]
  disabled_rules: []

  # Specific rules to force-enable (by rule ID).
  # These rules will run even if their category is disabled.
  # Use with caution.
  forced_rules: []

# --------------------------------------------------
# Schema Mapping / スキーマ名マッピング
# --------------------------------------------------
# Maps Oracle schema names to PostgreSQL schema names.
# If an Oracle schema is not listed here, it is removed (objects go to public).
schema_mapping:
  HR: "public"
  SCOTT: "public"
  # FINANCE: "finance"
  # SALES: "sales_schema"

# --------------------------------------------------
# Sequence Options / シーケンス設定
# --------------------------------------------------
sequences:
  # Convert Oracle sequences to PostgreSQL IDENTITY columns where possible
  prefer_identity: false

  # Default cache size for sequences (null = use PostgreSQL default)
  default_cache: null

# --------------------------------------------------
# PL/SQL Options / PL/SQL変換設定
# --------------------------------------------------
plsql:
  # Target language for converted procedures/functions
  # Options: "plpgsql", "sql"
  target_language: "plpgsql"

  # Add STRICT modifier to functions where appropriate
  add_strict: false

  # Convert DBMS_OUTPUT.PUT_LINE to RAISE NOTICE
  convert_dbms_output: true

# --------------------------------------------------
# Trigger Options / トリガー変換設定
# --------------------------------------------------
triggers:
  # Suffix for generated trigger functions
  function_suffix: "_fn"

# --------------------------------------------------
# Report Options / レポート設定
# --------------------------------------------------
report:
  # Generate HTML report
  html: true

  # Generate CSV report
  csv: true

  # Report language (overrides general language setting if set)
  # Set to null to use the general language setting.
  language: null
